    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoNerve | Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --green:#1db954;
    --blue:#0f3057;
    --dark:#071f0b;
    --glass-bg:rgba(255,255,255,0.08);
    --glass-border:rgba(255,255,255,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    height:100vh;
    background:  radial-gradient(ellipse at center, rgba(10, 50, 25, 0.95), rgba(5, 15, 8, 0.98)),
        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=80') center/cover;;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* Glow */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(29,185,84,0.25), transparent 70%);
    top:-200px;
    left:-200px;
    animation: float 6s infinite alternate ease-in-out;
}
@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(40px);}
}

.auth{
    width:420px;
    background:var(--glass-bg);
    backdrop-filter:blur(25px);
    border:1px solid var(--glass-border);
    border-radius:25px;
    padding:45px;
    box-shadow:0 25px 60px rgba(0,0,0,0.4);
    animation:fade 0.7s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.auth h2 {
    text-align:center;
    margin-bottom:25px;
    font-weight:700;
    font-size:28px;

    background: linear-gradient(270deg, #1db954, #ffffff, #1db954);
    background-size: 400% 400%;

    background-clip: text;
    -webkit-background-clip: text;

    color: transparent;
    -webkit-text-fill-color: transparent;

    animation: gradientMove 6s ease infinite, glowPulse 3s ease-in-out infinite;
    position: relative;
}

.auth h2::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--green), white);
    transition: 0.4s ease;
    transform: translateX(-50%);
}

.auth h2:hover::after {
    width: 60%;
}

/* Gradient animation */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glow animation */
@keyframes glowPulse {
    0% { text-shadow: 0 0 5px #1db954; }
    50% { text-shadow: 0 0 20px #1db954, 0 0 40px #1db954; }
    100% { text-shadow: 0 0 5px #1db954; }
}

input{
    width:100%;
    margin-bottom:15px;
    padding:12px 15px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.15);
    color:white;
}

input::placeholder{color:rgba(255,255,255,0.7);}

input:focus{box-shadow:0 0 10px var(--green);}

button {
    position: relative;
    overflow: hidden;
    width:100%;
    padding:12px;
    border-radius:30px;
    border:none;
    background:linear-gradient(135deg,var(--green),#17a74a);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(29,185,84,0.5);
}

/* Shine Effect */
button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.2),
        rgba(255,255,255,0.6),
        rgba(255,255,255,0.2)
    );
    transform: skewX(-25deg);
}

button:hover::before {
    animation: shine 0.8s forwards;
}

@keyframes shine {
    100% { left: 125%; }
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(29,185,84,0.4);
}

.switch{
    margin-top:18px;
    text-align:center;
    font-size:14px;
}

.switch a{
    color:var(--green);
    font-weight:600;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="auth">
    <h2>Login</h2>


    <input type="email" placeholder="Email Address" required>
    <input type="password" placeholder="Password" required>

    <button>Login</button>

    <div class="switch">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </div>
</div>

</body>
</html>
